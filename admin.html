<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmaPosh Admin Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f0f2f5; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; border-radius: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); overflow: hidden; }
        header { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo h1 { font-size: 1.8rem; letter-spacing: 1px; }
        .logo p { font-size: 0.8rem; opacity: 0.8; }
        .user-info { display: flex; gap: 20px; align-items: center; }
        .btn { padding: 8px 18px; border: none; border-radius: 40px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: #ffb347; color: #1e2a3e; }
        .btn-primary:hover { background: #ff9f1a; }
        .btn-outline { background: transparent; border: 1px solid white; color: white; }
        .btn-outline:hover { background: rgba(255,255,255,0.1); }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
        .btn-success { background: #28a745; color: white; }
        .btn-success:hover { background: #218838; }
        .btn-sm { padding: 5px 12px; font-size: 0.8rem; margin: 0 3px; }
        .main-content { padding: 30px; }
        .section { margin-bottom: 40px; border-bottom: 1px solid #e0e0e0; padding-bottom: 20px; }
        .section-title { font-size: 1.6rem; margin-bottom: 20px; color: #1e3c72; }
        .stats-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 30px; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 20px; flex: 1; min-width: 150px; text-align: center; }
        .stat-number { font-size: 2rem; font-weight: bold; }
        .stat-label { font-size: 0.9rem; opacity: 0.9; margin-top: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 12px; }
        .flex-btns { display: flex; gap: 10px; flex-wrap: wrap; margin: 15px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f5f5f5; }
        .alert { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 12px; margin-bottom: 20px; }
        .badge { background: #ffc107; color: #856404; padding: 4px 8px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        .hidden { display: none !important; }
        #modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        #modal > div { background: white; max-width: 500px; width: 90%; border-radius: 24px; padding: 20px; }
        footer { text-align: center; padding: 20px; font-size: 0.8rem; color: #666; background: #f8f9fa; }
        .loader { text-align: center; padding: 50px; font-size: 1.2rem; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="logo">
            <h1>👑 OmaPosh Admin Portal</h1>
            <p>co-operative management • staff & thrift oversight</p>
        </div>
        <div class="user-info">
            <span id="adminName"></span>
            <button class="btn btn-outline" id="logoutBtn">Logout</button>
        </div>
    </header>
    <div class="main-content">
        <!-- Login Section -->
        <div id="loginSection" class="auth-box" style="max-width:400px; margin:40px auto;">
            <h2>Admin Login</h2>
            <div class="form-group"><label>Email</label><input type="email" id="adminEmail" placeholder="admin@omaposhsmartsavings.com"></div>
            <div class="form-group"><label>Password</label><input type="password" id="adminPassword" placeholder="admin123"></div>
            <button class="btn btn-primary" id="adminLoginBtn">Login</button>
            <button class="btn btn-outline" id="createAdminBtn" style="margin-top:10px; background:#eee;">⚠️ Create Admin Account (if missing)</button>
            <div id="loginError" class="alert hidden" style="margin-top:15px;"></div>
        </div>

        <!-- Loading placeholder -->
        <div id="loadingSpinner" class="loader hidden">Loading dashboard...</div>

        <!-- Admin Dashboard Content -->
        <div id="dashboardContent" class="hidden">
            <div class="stats-row" id="statsCards"></div>

            <!-- Withdrawal Requests Section -->
            <div class="section">
                <div class="section-title">💰 Pending Withdrawal Requests</div>
                <div id="withdrawalRequestsTable"></div>
            </div>

            <div class="section">
                <div class="section-title">👥 Staff Management</div>
                <button class="btn btn-primary" id="createStaffBtn">+ Create Staff (Collector/Supervisor)</button>
                <div style="overflow-x:auto; margin-top:20px;">
                    <table id="staffTable">
                        <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Actions</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div class="section">
                <div class="section-title">👥 All Users</div>
                <div id="allUsersTable"></div>
            </div>

            <div class="section">
                <div class="section-title">💰 All Savings Plans</div>
                <div id="allPlansTable"></div>
            </div>

            <div class="section">
                <div class="section-title">👥 All Thrift Groups</div>
                <div id="allGroupsTable"></div>
            </div>
        </div>
    </div>
    <footer>© 2026 OmaPosh Smart Savings — Admin only</footer>
</div>

<!-- Modal -->
<div id="modal" class="hidden">
    <div>
        <h3 id="modalTitle"></h3>
        <div id="modalBody"></div>
        <div class="flex-btns"><button class="btn btn-outline" id="closeModalBtn">Cancel</button><button class="btn btn-primary" id="modalConfirmBtn">Confirm</button></div>
    </div>
</div>

<script type="module">
    const firebaseConfig = {
        apiKey: "AIzaSyBpQcjgebXvtFSbHtQ2B39m3lhrkzmvwXA",
        authDomain: "omaposh-smart-savings.firebaseapp.com",
        projectId: "omaposh-smart-savings",
        storageBucket: "omaposh-smart-savings.firebasestorage.app",
        messagingSenderId: "469614412839",
        appId: "1:469614412839:web:d51a47b468daad6184fa02"
    };

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, deleteDoc, onSnapshot, query, where, increment, runTransaction, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // DOM elements
    const loginSection = document.getElementById('loginSection');
    const dashboardContent = document.getElementById('dashboardContent');
    const loadingSpinner = document.getElementById('loadingSpinner');
    const adminNameSpan = document.getElementById('adminName');
    const logoutBtn = document.getElementById('logoutBtn');
    const loginError = document.getElementById('loginError');
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const confirmModalBtn = document.getElementById('modalConfirmBtn');

    let currentAdmin = null;
    let modalResolve = null;

    function showModal(title, bodyHtml, confirmText = "Confirm") {
        return new Promise(resolve => {
            modalTitle.innerText = title;
            modalBody.innerHTML = bodyHtml;
            confirmModalBtn.innerText = confirmText;
            modal.classList.remove('hidden');
            modalResolve = resolve;
        });
    }
    function closeModal() { modal.classList.add('hidden'); if(modalResolve) modalResolve(false); modalResolve = null; }
    confirmModalBtn.onclick = () => { if(modalResolve) modalResolve(true); closeModal(); };
    closeModalBtn.onclick = closeModal;
    modal.addEventListener('click', (e) => { if(e.target === modal) closeModal(); });

    function showMessage(msg, isError = true) {
        loginError.innerText = msg;
        loginError.classList.remove('hidden');
        setTimeout(() => loginError.classList.add('hidden'), 4000);
    }

    // Load withdrawal requests
    async function loadWithdrawalRequests() {
        const requestsQuery = query(collection(db, "withdrawal_requests"), where("status", "==", "pending"));
        const snapshot = await getDocs(requestsQuery);
        if (snapshot.empty) {
            document.getElementById('withdrawalRequestsTable').innerHTML = '<p>No pending withdrawal requests.</p>';
            return;
        }
        let html = '<table><thead><tr><th>User</th><th>Plan Type</th><th>Amount (₦)</th><th>Request Date</th><th>Plan ID</th><th>Actions</th></tr></thead><tbody>';
        for (const docSnap of snapshot.docs) {
            const req = docSnap.data();
            const userDoc = await getDoc(doc(db, "users", req.userId));
            const userName = userDoc.exists() ? userDoc.data().fullName : req.userId;
            html += `<tr>
                <td>${userName}</td>
                <td>${req.planType}</td>
                <td>₦${req.amount.toFixed(2)}</td>
                <td>${new Date(req.createdAt).toLocaleString()}</td>
                <td>${req.planId}</td>
                <td>
                    <button class="btn btn-sm btn-success" data-request="${docSnap.id}" data-action="approve">Approve</button>
                    <button class="btn btn-sm btn-danger" data-request="${docSnap.id}" data-action="reject">Reject</button>
                </td>
            </tr>`;
        }
        html += '</tbody></table>';
        document.getElementById('withdrawalRequestsTable').innerHTML = html;
        document.querySelectorAll('[data-action="approve"]').forEach(btn => btn.onclick = () => approveWithdrawal(btn.dataset.request));
        document.querySelectorAll('[data-action="reject"]').forEach(btn => btn.onclick = () => rejectWithdrawal(btn.dataset.request));
    }

    async function approveWithdrawal(requestId) {
        if (!confirm("Approve this withdrawal request? The amount will be moved to the user's flexible plan.")) return;
        const requestRef = doc(db, "withdrawal_requests", requestId);
        const requestSnap = await getDoc(requestRef);
        if (!requestSnap.exists()) return showMessage("Request not found");
        const request = requestSnap.data();
        const { userId, planId, amount } = request;
        
        try {
            await runTransaction(db, async (transaction) => {
                const planRef = doc(db, "savings_plans", planId);
                const planSnap = await transaction.get(planRef);
                if (!planSnap.exists()) throw new Error("Plan not found");
                const plan = planSnap.data();
                if (plan.userId !== userId) throw new Error("User mismatch");
                if (plan.balance < amount) throw new Error("Insufficient balance in plan");
                
                const plansQuery = query(collection(db, "savings_plans"), where("userId", "==", userId), where("type", "==", "flex"));
                const flexSnap = await transaction.get(plansQuery);
                let flexPlanRef;
                if (flexSnap.empty) {
                    const newFlexRef = doc(collection(db, "savings_plans"));
                    transaction.set(newFlexRef, {
                        userId: userId,
                        type: "flex",
                        balance: amount,
                        createdAt: new Date().toISOString()
                    });
                    flexPlanRef = newFlexRef;
                } else {
                    flexPlanRef = flexSnap.docs[0].ref;
                    transaction.update(flexPlanRef, { balance: increment(amount) });
                }
                transaction.update(planRef, { balance: increment(-amount) });
                transaction.update(requestRef, { status: "approved", processedAt: new Date().toISOString() });
                const txRef = doc(collection(db, "transactions"));
                transaction.set(txRef, {
                    userId: userId,
                    planId: planId,
                    amount: amount,
                    type: "withdrawal_approved",
                    description: `Withdrawal approved from ${plan.type} plan`,
                    date: new Date().toISOString()
                });
            });
            showMessage("Withdrawal approved successfully", false);
            loadWithdrawalRequests();
            loadAdminData();
        } catch (err) {
            showMessage("Error approving withdrawal: " + err.message);
        }
    }

    async function rejectWithdrawal(requestId) {
        if (!confirm("Reject this withdrawal request?")) return;
        const requestRef = doc(db, "withdrawal_requests", requestId);
        await updateDoc(requestRef, { status: "rejected", processedAt: new Date().toISOString() });
        showMessage("Request rejected", false);
        loadWithdrawalRequests();
    }

    // Load all admin data (stats, staff, users, plans, groups)
    async function loadAdminData() {
        if (!currentAdmin) return;
        const usersSnap = await getDocs(collection(db, "users"));
        const plansSnap = await getDocs(collection(db, "savings_plans"));
        const groupsSnap = await getDocs(collection(db, "groups"));
        const pendingRequestsSnap = await getDocs(query(collection(db, "withdrawal_requests"), where("status", "==", "pending")));
        let totalSavings = 0;
        plansSnap.forEach(d => totalSavings += d.data().balance || 0);
        document.getElementById('statsCards').innerHTML = `
            <div class="stat-card"><div class="stat-number">${usersSnap.size}</div><div class="stat-label">Total Users</div></div>
            <div class="stat-card"><div class="stat-number">₦${totalSavings.toLocaleString()}</div><div class="stat-label">Total Savings</div></div>
            <div class="stat-card"><div class="stat-number">${groupsSnap.size}</div><div class="stat-label">Thrift Groups</div></div>
            <div class="stat-card"><div class="stat-number">${pendingRequestsSnap.size}</div><div class="stat-label">Pending Withdrawals</div></div>
        `;

        // Staff table
        let staffHtml = '';
        for (const docSnap of usersSnap.docs) {
            const u = docSnap.data();
            if (u.role === 'collector' || u.role === 'supervisor') {
                staffHtml += `<tr>
                    <td>${u.fullName || 'No name'}</td>
                    <td>${u.email}</td>
                    <td>${u.role}</td>
                    <td>
                        <button class="btn btn-sm btn-primary" data-uid="${docSnap.id}" data-action="editRole">Edit Role</button>
                        <button class="btn btn-sm btn-danger" data-uid="${docSnap.id}" data-action="deleteStaff">Disable</button>
                    </td>
                </tr>`;
            }
        }
        document.querySelector('#staffTable tbody').innerHTML = staffHtml;
        document.querySelectorAll('[data-action="editRole"]').forEach(btn => btn.onclick = () => editStaffRole(btn.dataset.uid));
        document.querySelectorAll('[data-action="deleteStaff"]').forEach(btn => btn.onclick = () => disableStaff(btn.dataset.uid));

        // All users
        let usersHtml = '<table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Joined</th></tr></thead><tbody>';
        for (const docSnap of usersSnap.docs) {
            const u = docSnap.data();
            usersHtml += `<td>
                <td>${u.fullName || 'N/A'}</td>
                <td>${u.email}</td>
                <td>${u.role || 'user'}</td>
                <td>${new Date(u.createdAt).toLocaleDateString()}</td>
            </tr>`;
        }
        usersHtml += '</tbody></table>';
        document.getElementById('allUsersTable').innerHTML = usersHtml;

        // All plans
        let plansHtml = '</tr><thead><tr><th>User</th><th>Type</th><th>Balance</th><th>Details</th></tr></thead><tbody>';
        for (const docSnap of plansSnap.docs) {
            const p = docSnap.data();
            const userDoc = await getDoc(doc(db, "users", p.userId));
            const userName = userDoc.exists() ? userDoc.data().fullName : p.userId;
            let details = '';
            if (p.type === 'locked') details = `Lock until: ${new Date(p.lockUntil).toLocaleDateString()}`;
            else if (p.type === 'target') details = `Target: ₦${p.targetAmount} by ${new Date(p.targetDate).toLocaleDateString()}`;
            plansHtml += `<tr>
                <td>${userName}</td>
                <td>${p.type}</td>
                <td>₦${(p.balance||0).toFixed(2)}</td>
                <td>${details}</td>
            </tr>`;
        }
        plansHtml += '</tbody></table>';
        document.getElementById('allPlansTable').innerHTML = plansHtml;

        // All groups
        let groupsHtml = '</table><thead><tr><th>Group Name</th><th>Contribution</th><th>Members</th><th>Created By</th><th>Action</th></tr></thead><tbody>';
        for (const docSnap of groupsSnap.docs) {
            const g = docSnap.data();
            const creatorDoc = await getDoc(doc(db, "users", g.creatorId));
            const creatorName = creatorDoc.exists() ? creatorDoc.data().fullName : g.creatorId;
            groupsHtml += `<tr>
                <td>${g.name}</td>
                <td>₦${g.contributionAmount}</td>
                <td>${g.members?.length||0}/${g.maxMembers}</td>
                <td>${creatorName}</td>
                <td><button class="btn btn-sm btn-danger" data-group="${docSnap.id}" data-action="deleteGroup">Delete</button></td>
            </tr>`;
        }
        groupsHtml += '</tbody></table>';
        document.getElementById('allGroupsTable').innerHTML = groupsHtml;
        document.querySelectorAll('[data-action="deleteGroup"]').forEach(btn => btn.onclick = async () => {
            if (confirm("Permanently delete this group?")) {
                await deleteDoc(doc(db, "groups", btn.dataset.group));
                loadAdminData();
            }
        });
    }

    async function editStaffRole(uid) {
        const userDoc = await getDoc(doc(db, "users", uid));
        const currentRole = userDoc.data().role;
        const result = await showModal("Edit Role", `
            <select id="newRole">
                <option value="collector" ${currentRole==='collector' ? 'selected' : ''}>Collector</option>
                <option value="supervisor" ${currentRole==='supervisor' ? 'selected' : ''}>Supervisor</option>
                <option value="user">Regular User</option>
            </select>
        `, "Update");
        if (result) {
            const newRole = document.getElementById('newRole').value;
            await updateDoc(doc(db, "users", uid), { role: newRole });
            loadAdminData();
            showMessage(`Role updated to ${newRole}`, false);
        }
    }

    async function disableStaff(uid) {
        if (confirm("Disable this staff member? They will lose access.")) {
            await updateDoc(doc(db, "users", uid), { role: 'disabled' });
            loadAdminData();
            showMessage("Staff disabled", false);
        }
    }

    // Create staff
    document.getElementById('createStaffBtn').onclick = () => {
        showModal("Create Staff Account", `
            <div class="form-group"><label>Full Name</label><input id="staffFullName" placeholder="John Doe"></div>
            <div class="form-group"><label>Email</label><input id="staffEmail" placeholder="staff@example.com"></div>
            <div class="form-group"><label>Password</label><input type="password" id="staffPassword" placeholder="min 6 chars"></div>
            <div class="form-group"><label>Role</label><select id="staffRoleSelect"><option value="collector">Collector</option><option value="supervisor">Supervisor</option></select></div>
        `, "Create").then(async (confirmed) => {
            if (confirmed) {
                const name = document.getElementById('staffFullName').value;
                const email = document.getElementById('staffEmail').value;
                const pwd = document.getElementById('staffPassword').value;
                const role = document.getElementById('staffRoleSelect').value;
                if (!email || !pwd) return showMessage("Email and password required");
                try {
                    const userCred = await createUserWithEmailAndPassword(auth, email, pwd);
                    await setDoc(doc(db, "users", userCred.user.uid), {
                        fullName: name,
                        email: email,
                        role: role,
                        createdAt: new Date().toISOString()
                    });
                    showMessage(`Staff ${name} created as ${role}`, false);
                    loadAdminData();
                } catch(e) { showMessage(e.message); }
            }
        });
    };

    // Create admin account manually
    document.getElementById('createAdminBtn').onclick = async () => {
        try {
            const userCred = await createUserWithEmailAndPassword(auth, "admin@omaposhsmartsavings.com", "admin123");
            await setDoc(doc(db, "users", userCred.user.uid), {
                fullName: "Super Administrator",
                email: "admin@omaposhsmartsavings.com",
                role: "admin",
                createdAt: new Date().toISOString()
            });
            showMessage("Admin account created! You can now login.", false);
        } catch(e) {
            showMessage("Error: " + e.message);
        }
    };

    // Admin login
    document.getElementById('adminLoginBtn').onclick = async () => {
        const email = document.getElementById('adminEmail').value;
        const password = document.getElementById('adminPassword').value;
        try {
            await signInWithEmailAndPassword(auth, email, password);
            // Auth state listener will handle routing
        } catch(e) {
            showMessage(e.message);
        }
    };

    logoutBtn.onclick = async () => {
        await signOut(auth);
    };

    // Auth state observer
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            // Ensure user document exists and set role to admin if email matches
            const userRef = doc(db, "users", user.uid);
            const userSnap = await getDoc(userRef);
            let role = userSnap.exists() ? userSnap.data().role : null;
            
            // Force admin role for the special email
            if (user.email === "admin@omaposhsmartsavings.com" && role !== 'admin') {
                await setDoc(userRef, {
                    fullName: userSnap.exists() ? userSnap.data().fullName : "Administrator",
                    email: user.email,
                    role: "admin",
                    createdAt: userSnap.exists() ? userSnap.data().createdAt : new Date().toISOString()
                }, { merge: true });
                role = 'admin';
            }
            
            if (role === 'admin') {
                currentAdmin = user;
                const fullName = userSnap.exists() ? userSnap.data().fullName : user.email;
                adminNameSpan.innerText = `👋 ${fullName}`;
                loginSection.classList.add('hidden');
                loadingSpinner.classList.remove('hidden');
                dashboardContent.classList.add('hidden');
                
                // Load data and then show dashboard
                await loadAdminData();
                await loadWithdrawalRequests();
                loadingSpinner.classList.add('hidden');
                dashboardContent.classList.remove('hidden');
                
                // Real-time listeners
                const unsubUsers = onSnapshot(collection(db, "users"), () => loadAdminData());
                const unsubPlans = onSnapshot(collection(db, "savings_plans"), () => loadAdminData());
                const unsubGroups = onSnapshot(collection(db, "groups"), () => loadAdminData());
                const unsubRequests = onSnapshot(query(collection(db, "withdrawal_requests"), where("status", "==", "pending")), () => loadWithdrawalRequests());
                window.adminListeners = [unsubUsers, unsubPlans, unsubGroups, unsubRequests];
            } else {
                // Not admin – force sign out
                await signOut(auth);
                loginSection.classList.remove('hidden');
                dashboardContent.classList.add('hidden');
                loadingSpinner.classList.add('hidden');
                showMessage("Access denied: Admin only.");
            }
        } else {
            // User not logged in
            currentAdmin = null;
            loginSection.classList.remove('hidden');
            dashboardContent.classList.add('hidden');
            loadingSpinner.classList.add('hidden');
            if (window.adminListeners) window.adminListeners.forEach(fn => fn());
        }
    });
</script>
</body>
</html>
