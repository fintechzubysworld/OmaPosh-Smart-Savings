<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>OmaPosh | Login or Register</title>

    <!-- EmailJS library (for custom password reset email) -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <style>
        /* --- styles unchanged from your original --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-container { max-width: 450px; width: 100%; margin: auto; }
        .auth-box { background: white; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 30px; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #1e3c72; font-size: 1.8rem; }
        .logo p { color: #666; font-size: 0.8rem; }
        .btn { padding: 12px 20px; border: none; border-radius: 40px; cursor: pointer; font-weight: 600; transition: 0.2s; width: 100%; font-size: 1rem; }
        .btn-primary { background: #ffb347; color: #1e2a3e; }
        .btn-primary:hover { background: #ff9f1a; }
        .btn-outline { background: #e9ecef; color: #333; border: 1px solid #ccc; }
        .btn-outline:hover { background: #dee2e6; }
        .btn-link { background: none; border: none; color: #ff9f1a; font-weight: 500; cursor: pointer; font-size: 0.85rem; margin-top: 8px; text-decoration: underline; width: auto; padding: 6px 0; }
        .btn-link:hover { color: #e68900; }
        .flex-btns { display: flex; gap: 12px; margin: 20px 0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #1e3c72; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 12px; font-size: 1rem; }
        .hidden { display: none !important; }
        .alert { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 0.9rem; }
        .alert-success { background: #d4edda; color: #155724; }
        .text-center { text-align: center; }
        .small-link { margin-top: 15px; display: block; text-align: center; font-size: 0.85rem; }
        footer { text-align: center; margin-top: 30px; font-size: 0.7rem; color: #666; }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="auth-box">
        <div class="logo">
            <h1>💰 OmaPosh</h1>
            <p>Smart Savings • Thrift • Co-operative</p>
        </div>

        <!-- LOGIN FORM -->
        <div id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="••••••">
            </div>
            <button class="btn btn-primary" id="doLoginBtn">Login</button>
            
            <div class="text-center small-link">
                <button id="forgotPasswordBtn" class="btn-link">🔑 Forgot password?</button>
            </div>
            
            <div class="flex-btns" style="justify-content: center; margin-top: 15px;">
                <button class="btn btn-outline" id="showRegisterBtn">Create Account</button>
            </div>
        </div>

        <!-- REGISTER FORM -->
        <div id="registerForm" class="hidden">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="regFullName" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword" placeholder="min 6 chars">
            </div>
            <button class="btn btn-primary" id="doRegisterBtn">Create Account</button>
            <div class="flex-btns" style="justify-content: center; margin-top: 15px;">
                <button class="btn btn-outline" id="showLoginBtn">Back to Login</button>
            </div>
        </div>

        <!-- PASSWORD RESET FORM (EmailJS + Firebase) -->
        <div id="resetForm" class="hidden">
            <div class="form-group">
                <label>Email address</label>
                <input type="email" id="resetEmail" placeholder="your@email.com">
                <p style="font-size: 0.7rem; color: #666; margin-top: 6px;">
                    We'll send a reset link via email (using EmailJS) and also a secure Firebase reset email.
                </p>
            </div>
            <button class="btn btn-primary" id="doResetBtn">Send reset email</button>
            <div class="flex-btns" style="justify-content: center; margin-top: 15px;">
                <button class="btn btn-outline" id="backToLoginFromResetBtn">Back to Login</button>
            </div>
        </div>

        <!-- Global message area (errors / success) -->
        <div id="authMessage" class="alert hidden"></div>
    </div>
    <footer>© 2026 OmaPosh Smart Savings</footer>
</div>

<script type="module">
    // ========== FIREBASE IMPORTS ==========
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
        getAuth, 
        createUserWithEmailAndPassword, 
        signInWithEmailAndPassword, 
        onAuthStateChanged,
        sendPasswordResetEmail   // Firebase's built-in reset email
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { 
        getFirestore, 
        doc, 
        setDoc, 
        addDoc, 
        collection, 
        getDoc 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // ========== FIREBASE CONFIG ==========
    const firebaseConfig = {
        apiKey: "AIzaSyBpQcjgebXvtFSbHtQ2B39m3lhrkzmvwXA",
        authDomain: "omaposh-smart-savings.firebaseapp.com",
        projectId: "omaposh-smart-savings",
        storageBucket: "omaposh-smart-savings.firebasestorage.app",
        messagingSenderId: "469614412839",
        appId: "1:469614412839:web:d51a47b468daad6184fa02"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ========== EMAILJS SETUP (from reset.html) ==========
    const EMAILJS_PUBLIC_KEY = "uwDz5T65dSTM4RRJ3";      // Your public key
    const EMAILJS_SERVICE_ID = "service_mpqnvxf";        // Your service ID
    const EMAILJS_TEMPLATE_ID = "template_6sxcqx1";      // Your template ID

    // Initialize EmailJS
    emailjs.init(EMAILJS_PUBLIC_KEY);

    // ========== UI ELEMENTS ==========
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const resetForm = document.getElementById('resetForm');
    const authMsg = document.getElementById('authMessage');

    let isRegistering = false;
    let isResetting = false;

    // ========== HELPER FUNCTIONS ==========
    function showMessage(msg, isError = true) {
        authMsg.innerText = msg;
        authMsg.classList.remove('hidden');
        authMsg.classList.remove('alert-success');
        if (!isError) authMsg.classList.add('alert-success');
        setTimeout(() => authMsg.classList.add('hidden'), 8000);
    }

    function clearMessage() {
        authMsg.classList.add('hidden');
        authMsg.innerText = '';
    }

    async function sendWelcomeMessage(userId) {
        try {
            const configRef = doc(db, "admin_config", "messages");
            const configSnap = await getDoc(configRef);
            let subject = "Welcome to OmaPosh";
            let body = "Thank you for joining OmaPosh Smart Savings! Start saving and joining thrift groups today.";
            if (configSnap.exists()) {
                const data = configSnap.data();
                if (data.welcomeSubject) subject = data.welcomeSubject;
                if (data.welcomeBody) body = data.welcomeBody;
            }
            await addDoc(collection(db, "messages"), {
                userId: userId,
                subject: subject,
                message: body,
                read: false,
                createdAt: new Date(),
                type: "welcome"
            });
            console.log("✅ Welcome message sent");
        } catch (err) {
            console.warn("⚠️ Welcome message not sent:", err);
        }
    }

    // ========== FORM SWITCHING ==========
    document.getElementById('showRegisterBtn').onclick = () => {
        clearMessage();
        loginForm.classList.add('hidden');
        resetForm.classList.add('hidden');
        registerForm.classList.remove('hidden');
    };
    
    document.getElementById('showLoginBtn').onclick = () => {
        clearMessage();
        registerForm.classList.add('hidden');
        resetForm.classList.add('hidden');
        loginForm.classList.remove('hidden');
    };
    
    document.getElementById('forgotPasswordBtn').onclick = () => {
        clearMessage();
        loginForm.classList.add('hidden');
        registerForm.classList.add('hidden');
        resetForm.classList.remove('hidden');
        const loginEmail = document.getElementById('loginEmail').value.trim();
        if (loginEmail) {
            document.getElementById('resetEmail').value = loginEmail;
        }
    };
    
    document.getElementById('backToLoginFromResetBtn').onclick = () => {
        clearMessage();
        resetForm.classList.add('hidden');
        registerForm.classList.add('hidden');
        loginForm.classList.remove('hidden');
        isResetting = false;
    };

    // ========== PASSWORD RESET – EMAILJS + FIREBASE ==========
    const doResetBtn = document.getElementById('doResetBtn');
    const resetEmailInput = document.getElementById('resetEmail');

    doResetBtn.onclick = async () => {
        const email = resetEmailInput.value.trim();
        if (!email) {
            showMessage("Please enter your email address.");
            return;
        }
        if (!email.includes('@') || !email.includes('.')) {
            showMessage("Please enter a valid email address.");
            return;
        }

        const originalBtnText = doResetBtn.innerText;
        doResetBtn.innerText = "Sending...";
        doResetBtn.disabled = true;
        isResetting = true;

        try {
            // 1. Send custom email via EmailJS (the message from reset.html)
            await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                to_email: email  // must match {{to_email}} in your EmailJS template
            });
            showMessage(`✅ Custom reset email sent to ${email} via EmailJS.`, false);

            // 2. Also send the Firebase password reset email (so the user gets a real reset link)
            try {
                await sendPasswordResetEmail(auth, email);
                showMessage(`✅ Firebase reset email also sent. Check your inbox for two emails.`, false);
            } catch (firebaseErr) {
                console.warn("Firebase reset email failed:", firebaseErr);
                // Don't overwrite the previous success – the EmailJS part worked.
            }

            resetEmailInput.value = '';
            
            // Show confirmation and redirect back to login after a short delay
            setTimeout(() => {
                resetForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
                clearMessage();
                showMessage("Check your email (and spam folder) for reset instructions.", false);
                isResetting = false;
            }, 3000);

        } catch (emailjsErr) {
            console.error("EmailJS send failed:", emailjsErr);
            showMessage("Failed to send reset email. Please try again later.");
            isResetting = false;
        } finally {
            doResetBtn.innerText = originalBtnText;
            doResetBtn.disabled = false;
        }
    };

    // ========== LOGIN ==========
    document.getElementById('doLoginBtn').onclick = async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const pwd = document.getElementById('loginPassword').value;
        if (!email || !pwd) {
            showMessage("Please enter both email and password.");
            return;
        }
        try {
            await signInWithEmailAndPassword(auth, email, pwd);
        } catch(e) {
            let errorMsg = e.message;
            if (e.code === 'auth/user-not-found') errorMsg = "No account found with this email.";
            else if (e.code === 'auth/wrong-password') errorMsg = "Incorrect password.";
            else if (e.code === 'auth/too-many-requests') errorMsg = "Too many failed attempts. Try again later.";
            showMessage(errorMsg);
        }
    };

    // ========== REGISTER ==========
    document.getElementById('doRegisterBtn').onclick = async () => {
        const email = document.getElementById('regEmail').value.trim();
        const pwd = document.getElementById('regPassword').value;
        const fullName = document.getElementById('regFullName').value.trim();

        if (!email || !pwd || !fullName) {
            showMessage("All fields are required.");
            return;
        }
        if (pwd.length < 6) {
            showMessage("Password must be at least 6 characters.");
            return;
        }

        const registerBtn = document.getElementById('doRegisterBtn');
        const originalText = registerBtn.innerText;
        registerBtn.innerText = "Creating account...";
        registerBtn.disabled = true;
        isRegistering = true;

        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, pwd);
            const uid = userCred.user.uid;
            
            const userData = {
                fullName: fullName,
                email: email,
                role: "user",
                createdAt: new Date().toISOString(),
                disabled: false,
                permissions: {}
            };
            
            // Retry logic for Firestore
            let writeSuccess = false;
            let retries = 3;
            while (retries > 0 && !writeSuccess) {
                try {
                    await setDoc(doc(db, "users", uid), userData);
                    writeSuccess = true;
                } catch (firestoreErr) {
                    console.warn(`Firestore write retry left: ${retries-1}`, firestoreErr.message);
                    retries--;
                    if (retries === 0) throw firestoreErr;
                    await new Promise(r => setTimeout(r, 1000));
                }
            }

            await sendWelcomeMessage(uid);
            showMessage("Registration successful! Redirecting...", false);
            setTimeout(() => { window.location.href = 'index.html'; }, 1500);

        } catch (error) {
            console.error("Registration error:", error);
            let errorMsg = error.message;
            if (error.code === 'auth/email-already-in-use') {
                errorMsg = "Email already registered. Please login instead.";
                registerForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
            }
            showMessage(errorMsg);
            isRegistering = false;
            registerBtn.disabled = false;
            registerBtn.innerText = originalText;
        }
    };

    // ========== AUTH STATE LISTENER ==========
    onAuthStateChanged(auth, (user) => {
        if (user && !isRegistering && !isResetting) {
            window.location.href = 'index.html';
        }
    });

    // ========== ENTER KEY LISTENERS ==========
    resetEmailInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            doResetBtn.click();
        }
    });

    document.getElementById('loginPassword').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            document.getElementById('doLoginBtn').click();
        }
    });

    document.getElementById('regPassword').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            document.getElementById('doRegisterBtn').click();
        }
    });

    // Prevent redirect on manual form hide
    const resetObserver = new MutationObserver(() => {
        if (resetForm.classList.contains('hidden')) {
            isResetting = false;
        }
    });
    resetObserver.observe(resetForm, { attributes: true, attributeFilter: ['class'] });

    console.log("✅ OmaPosh auth system ready – EmailJS + Firebase password reset active.");
</script>
</body>
</html>
