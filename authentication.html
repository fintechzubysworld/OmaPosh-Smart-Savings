<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>OmaPosh | Login or Register</title>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import {
            getAuth,
            createUserWithEmailAndPassword,
            signInWithEmailAndPassword,
            onAuthStateChanged,
            sendPasswordResetEmail
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import {
            getFirestore,
            doc,
            setDoc,
            addDoc,
            collection,
            getDoc
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBpQcjgebXvtFSbHtQ2B39m3lhrkzmvwXA",
            authDomain: "omaposh-smart-savings.firebaseapp.com",
            projectId: "omaposh-smart-savings",
            storageBucket: "omaposh-smart-savings.firebasestorage.app",
            messagingSenderId: "469614412839",
            appId: "1:469614412839:web:d51a47b468daad6184fa02"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ---------- EmailJS configuration ----------
        // These are your real keys (already filled in)
        const EMAILJS_PUBLIC_KEY = "uwDz5T65dSTM4RRJ3";
        const EMAILJS_SERVICE_ID = "service_mpqnvxf";
        const EMAILJS_WELCOME_TEMPLATE_ID = "WELCOME_TEMPLATE_ID"; // <-- replace with your welcome template ID

        // Load EmailJS library (separate script tag, non-module, but fine)
        // We'll initialize after DOM loads, because the script is loaded synchronously.
        // Actually we'll load emailjs from CDN in a traditional script tag.
    </script>
    <!-- EmailJS CDN -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-container { max-width: 450px; width: 100%; margin: auto; }
        .auth-box { background: white; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 30px; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #1e3c72; font-size: 1.8rem; }
        .logo p { color: #666; font-size: 0.8rem; }
        .btn { padding: 12px 20px; border: none; border-radius: 40px; cursor: pointer; font-weight: 600; transition: 0.2s; width: 100%; font-size: 1rem; }
        .btn-primary { background: #ffb347; color: #1e2a3e; }
        .btn-primary:hover { background: #ff9f1a; }
        .btn-outline { background: #e9ecef; color: #333; border: 1px solid #ccc; }
        .btn-outline:hover { background: #dee2e6; }
        .btn-link { background: none; border: none; color: #ff9f1a; font-weight: 500; cursor: pointer; font-size: 0.85rem; margin-top: 8px; text-decoration: underline; width: auto; padding: 6px 0; }
        .btn-link:hover { color: #e68900; }
        .flex-btns { display: flex; gap: 12px; margin: 20px 0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #1e3c72; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 12px; font-size: 1rem; }
        .hidden { display: none !important; }
        .alert { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 0.9rem; }
        .alert-success { background: #d4edda; color: #155724; }
        .text-center { text-align: center; }
        .small-link { margin-top: 15px; display: block; text-align: center; font-size: 0.85rem; }
        footer { text-align: center; margin-top: 30px; font-size: 0.7rem; color: #666; }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="auth-box">
        <div class="logo">
            <h1>💰 OmaPosh</h1>
            <p>Smart Savings • Thrift • Co-operative</p>
        </div>

        <!-- LOGIN FORM -->
        <div id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="••••••">
            </div>
            <button class="btn btn-primary" id="doLoginBtn">Login</button>
            <div class="text-center small-link">
                <button id="forgotPasswordBtn" class="btn-link">🔑 Forgot password?</button>
            </div>
            <div class="flex-btns" style="justify-content: center; margin-top: 15px;">
                <button class="btn btn-outline" id="showRegisterBtn">Create Account</button>
            </div>
        </div>

        <!-- REGISTER FORM -->
        <div id="registerForm" class="hidden">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="regFullName" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword" placeholder="min 6 chars">
            </div>
            <button class="btn btn-primary" id="doRegisterBtn">Create Account</button>
            <div class="flex-btns" style="justify-content: center; margin-top: 15px;">
                <button class="btn btn-outline" id="showLoginBtn">Back to Login</button>
            </div>
        </div>

        <!-- PASSWORD RESET FORM (uses Firebase built‑in reset email) -->
        <div id="resetForm" class="hidden">
            <div class="form-group">
                <label>Email address</label>
                <input type="email" id="resetEmail" placeholder="your@email.com">
                <p style="font-size: 0.7rem; color: #666; margin-top: 6px;">We'll send a password reset link to this email.</p>
            </div>
            <button class="btn btn-primary" id="doResetBtn">Send reset email</button>
            <div class="flex-btns" style="justify-content: center; margin-top: 15px;">
                <button class="btn btn-outline" id="backToLoginFromResetBtn">Back to Login</button>
            </div>
        </div>

        <div id="authMessage" class="alert hidden"></div>
    </div>
    <footer>© 2026 OmaPosh Smart Savings</footer>
</div>

<script>
    // Initialize EmailJS
    (function() {
        emailjs.init("uwDz5T65dSTM4RRJ3");
    })();

    // ---------- UI elements ----------
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const resetForm = document.getElementById('resetForm');
    const authMsg = document.getElementById('authMessage');

    // We can't access the Firebase modules directly from here because they're in a module script.
    // So we'll use a small trick: attach needed functions to window inside the module.
    // I'll rewrite the main logic to be inside the module script, but the UI event handlers
    // that reference EmailJS must also be inside the module (or we can call EmailJS from there).
    // Actually, the emailjs object is globally available because it's loaded via a classic script.
    // So we can keep the main Firebase logic inside the module, and still call emailjs.
    // I'll move the entire script into a single module script, including the UI event bindings.
</script>

<script type="module">
    // Now we have access to both Firebase imports and the global emailjs object.
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {
        getAuth,
        createUserWithEmailAndPassword,
        signInWithEmailAndPassword,
        onAuthStateChanged,
        sendPasswordResetEmail
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import {
        getFirestore,
        doc,
        setDoc,
        addDoc,
        collection,
        getDoc
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBpQcjgebXvtFSbHtQ2B39m3lhrkzmvwXA",
        authDomain: "omaposh-smart-savings.firebaseapp.com",
        projectId: "omaposh-smart-savings",
        storageBucket: "omaposh-smart-savings.firebasestorage.app",
        messagingSenderId: "469614412839",
        appId: "1:469614412839:web:d51a47b468daad6184fa02"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // EmailJS credentials
    const EMAILJS_SERVICE_ID = "service_mpqnvxf";
    const EMAILJS_WELCOME_TEMPLATE_ID = "WELCOME_TEMPLATE_ID"; // <-- replace with your actual welcome template ID

    // DOM elements
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const resetForm = document.getElementById('resetForm');
    const authMsg = document.getElementById('authMessage');

    // Flags
    let isRegistering = false;
    let isResetting = false;

    function showMessage(msg, isError = true) {
        authMsg.innerText = msg;
        authMsg.classList.remove('hidden');
        authMsg.classList.remove('alert-success');
        if (!isError) authMsg.classList.add('alert-success');
        setTimeout(() => authMsg.classList.add('hidden'), 8000);
    }

    function clearMessage() {
        authMsg.classList.add('hidden');
        authMsg.innerText = '';
    }

    // Send welcome email via EmailJS
    async function sendWelcomeEmail(email, fullName) {
        if (EMAILJS_WELCOME_TEMPLATE_ID === "WELCOME_TEMPLATE_ID") {
            console.warn("Welcome template ID not set. Skipping welcome email.");
            return;
        }
        try {
            const response = await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_WELCOME_TEMPLATE_ID, {
                to_email: email,
                user_name: fullName
            });
            console.log("Welcome email sent:", response.status);
        } catch (error) {
            console.error("Welcome email failed:", error);
            // Not critical – we don't show an error to the user for this
        }
    }

    // Save welcome message in Firestore (optional, legacy feature)
    async function sendWelcomeMessageToFirestore(userId) {
        try {
            const configRef = doc(db, "admin_config", "messages");
            const configSnap = await getDoc(configRef);
            let subject = "Welcome to OmaPosh";
            let body = "Thank you for joining OmaPosh Smart Savings! Start saving and joining thrift groups today.";
            if (configSnap.exists()) {
                const data = configSnap.data();
                if (data.welcomeSubject) subject = data.welcomeSubject;
                if (data.welcomeBody) body = data.welcomeBody;
            }
            await addDoc(collection(db, "messages"), {
                userId: userId,
                subject: subject,
                message: body,
                read: false,
                createdAt: new Date(),
                type: "welcome"
            });
        } catch (err) {
            console.warn("Firestore welcome message not sent:", err);
        }
    }

    // ---------- UI switching ----------
    document.getElementById('showRegisterBtn').onclick = () => {
        clearMessage();
        loginForm.classList.add('hidden');
        resetForm.classList.add('hidden');
        registerForm.classList.remove('hidden');
    };
    document.getElementById('showLoginBtn').onclick = () => {
        clearMessage();
        registerForm.classList.add('hidden');
        resetForm.classList.add('hidden');
        loginForm.classList.remove('hidden');
    };
    document.getElementById('forgotPasswordBtn').onclick = () => {
        clearMessage();
        loginForm.classList.add('hidden');
        registerForm.classList.add('hidden');
        resetForm.classList.remove('hidden');
        const loginEmail = document.getElementById('loginEmail').value.trim();
        if (loginEmail) document.getElementById('resetEmail').value = loginEmail;
    };
    document.getElementById('backToLoginFromResetBtn').onclick = () => {
        clearMessage();
        resetForm.classList.add('hidden');
        registerForm.classList.add('hidden');
        loginForm.classList.remove('hidden');
        isResetting = false;
    };

    // ---------- Password Reset (Firebase) ----------
    document.getElementById('doResetBtn').onclick = async () => {
        const email = document.getElementById('resetEmail').value.trim();
        if (!email) { showMessage("Please enter your email address."); return; }
        if (!email.includes('@') || !email.includes('.')) { showMessage("Please enter a valid email address."); return; }

        const btn = document.getElementById('doResetBtn');
        const originalText = btn.innerText;
        btn.innerText = "Sending...";
        btn.disabled = true;
        isResetting = true;

        try {
            await sendPasswordResetEmail(auth, email);
            showMessage(`✅ Password reset link sent to ${email}. Check your inbox (and spam folder).`, false);
            setTimeout(() => {
                resetForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
                clearMessage();
                showMessage("Reset email sent! Follow the instructions to set a new password.", false);
                isResetting = false;
            }, 3000);
        } catch (error) {
            console.error(error);
            let msg = error.message;
            if (error.code === 'auth/user-not-found') msg = "No account found with this email.";
            else if (error.code === 'auth/too-many-requests') msg = "Too many attempts. Try again later.";
            showMessage(msg);
            isResetting = false;
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    };

    // ---------- Login ----------
    document.getElementById('doLoginBtn').onclick = async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const pwd = document.getElementById('loginPassword').value;
        if (!email || !pwd) { showMessage("Please enter email and password."); return; }
        try {
            await signInWithEmailAndPassword(auth, email, pwd);
            // redirect handled by onAuthStateChanged
        } catch (e) {
            let msg = e.message;
            if (e.code === 'auth/user-not-found') msg = "No account found with this email.";
            else if (e.code === 'auth/wrong-password') msg = "Incorrect password.";
            showMessage(msg);
        }
    };

    // ---------- Registration (with welcome email) ----------
    document.getElementById('doRegisterBtn').onclick = async () => {
        const email = document.getElementById('regEmail').value.trim();
        const pwd = document.getElementById('regPassword').value;
        const fullName = document.getElementById('regFullName').value.trim();

        if (!email || !pwd || !fullName) { showMessage("All fields are required."); return; }
        if (pwd.length < 6) { showMessage("Password must be at least 6 characters."); return; }

        const btn = document.getElementById('doRegisterBtn');
        const originalText = btn.innerText;
        btn.innerText = "Creating account...";
        btn.disabled = true;
        isRegistering = true;

        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, pwd);
            const uid = userCred.user.uid;

            // Firestore user document
            await setDoc(doc(db, "users", uid), {
                fullName: fullName,
                email: email,
                role: "user",
                createdAt: new Date().toISOString(),
                disabled: false,
                permissions: {}
            });

            // Send welcome email via EmailJS (custom branded email)
            sendWelcomeEmail(email, fullName);   // fire-and-forget, don't block UI

            // Optional legacy Firestore message
            sendWelcomeMessageToFirestore(uid);

            showMessage("Registration successful! Redirecting...", false);
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        } catch (error) {
            console.error(error);
            let msg = error.message;
            if (error.code === 'auth/email-already-in-use') {
                msg = "Email already registered. Please login instead.";
                registerForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
            }
            showMessage(msg);
            isRegistering = false;
            btn.disabled = false;
            btn.innerText = originalText;
        }
    };

    // ---------- Redirect on auth state change ----------
    onAuthStateChanged(auth, (user) => {
        if (user && !isRegistering && !isResetting) {
            if (window.location.pathname.includes('login.html') ||
                window.location.pathname.endsWith('/') ||
                window.location.pathname === '' ||
                window.location.pathname.includes('auth.html')) {
                window.location.href = 'index.html';
            } else {
                window.location.href = 'index.html';
            }
        }
    });

    // Enter key shortcuts
    document.getElementById('loginPassword').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); document.getElementById('doLoginBtn').click(); }
    });
    document.getElementById('regPassword').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); document.getElementById('doRegisterBtn').click(); }
    });
    document.getElementById('resetEmail').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); document.getElementById('doResetBtn').click(); }
    });

    console.log("✅ OmaPosh ready – Firebase auth + EmailJS welcome emails integrated.");
</script>
</body>
</html>
