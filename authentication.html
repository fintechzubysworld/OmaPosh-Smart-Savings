<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>OmaPosh | Login or Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-container { max-width: 450px; width: 100%; margin: auto; }
        .auth-box { background: white; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 30px; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #1e3c72; font-size: 1.8rem; }
        .logo p { color: #666; font-size: 0.8rem; }
        .btn { padding: 12px 20px; border: none; border-radius: 40px; cursor: pointer; font-weight: 600; transition: 0.2s; width: 100%; font-size: 1rem; }
        .btn-primary { background: #ffb347; color: #1e2a3e; }
        .btn-primary:hover { background: #ff9f1a; }
        .btn-outline { background: #e9ecef; color: #333; border: 1px solid #ccc; }
        .btn-outline:hover { background: #dee2e6; }
        .btn-link { background: none; border: none; color: #ff9f1a; font-weight: 500; cursor: pointer; font-size: 0.85rem; margin-top: 8px; text-decoration: underline; width: auto; padding: 6px 0; }
        .btn-link:hover { color: #e68900; }
        .flex-btns { display: flex; gap: 12px; margin: 20px 0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #1e3c72; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 12px; font-size: 1rem; }
        .hidden { display: none !important; }
        .alert { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 0.9rem; }
        .alert-success { background: #d4edda; color: #155724; }
        .text-center { text-align: center; }
        .small-link { margin-top: 15px; display: block; text-align: center; font-size: 0.85rem; }
        footer { text-align: center; margin-top: 30px; font-size: 0.7rem; color: #666; }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="auth-box">
        <div class="logo">
            <h1>💰 OmaPosh</h1>
            <p>Smart Savings • Thrift • Co-operative</p>
        </div>

        <!-- LOGIN FORM -->
        <div id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="••••••">
            </div>
            <button class="btn btn-primary" id="doLoginBtn">Login</button>
            
            <!-- Forgot password link (styled as button-link) -->
            <div class="text-center small-link">
                <button id="forgotPasswordBtn" class="btn-link">🔑 Forgot password?</button>
            </div>
            
            <div class="flex-btns" style="justify-content: center; margin-top: 15px;">
                <button class="btn btn-outline" id="showRegisterBtn">Create Account</button>
            </div>
        </div>

        <!-- REGISTER FORM -->
        <div id="registerForm" class="hidden">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="regFullName" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword" placeholder="min 6 chars">
            </div>
            <button class="btn btn-primary" id="doRegisterBtn">Create Account</button>
            <div class="flex-btns" style="justify-content: center; margin-top: 15px;">
                <button class="btn btn-outline" id="showLoginBtn">Back to Login</button>
            </div>
        </div>

        <!-- PASSWORD RESET FORM -->
        <div id="resetForm" class="hidden">
            <div class="form-group">
                <label>Email address</label>
                <input type="email" id="resetEmail" placeholder="your@email.com">
                <p style="font-size: 0.7rem; color: #666; margin-top: 6px;">We'll send a password reset link to this email.</p>
            </div>
            <button class="btn btn-primary" id="doResetBtn">Send reset email</button>
            <div class="flex-btns" style="justify-content: center; margin-top: 15px;">
                <button class="btn btn-outline" id="backToLoginFromResetBtn">Back to Login</button>
            </div>
        </div>

        <!-- Global message area (errors / success) -->
        <div id="authMessage" class="alert hidden"></div>
    </div>
    <footer>© 2026 OmaPosh Smart Savings</footer>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
        getAuth, 
        createUserWithEmailAndPassword, 
        signInWithEmailAndPassword, 
        onAuthStateChanged,
        sendPasswordResetEmail          // <-- import for password reset
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { 
        getFirestore, 
        doc, 
        setDoc, 
        addDoc, 
        collection, 
        getDoc 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Firebase configuration (using provided credentials)
    const firebaseConfig = {
        apiKey: "AIzaSyBpQcjgebXvtFSbHtQ2B39m3lhrkzmvwXA",
        authDomain: "omaposh-smart-savings.firebaseapp.com",
        projectId: "omaposh-smart-savings",
        storageBucket: "omaposh-smart-savings.firebasestorage.app",
        messagingSenderId: "469614412839",
        appId: "1:469614412839:web:d51a47b468daad6184fa02"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // DOM elements
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const resetForm = document.getElementById('resetForm');
    const authMsg = document.getElementById('authMessage');

    // Flags to control redirect behavior
    let isRegistering = false;
    let isResetting = false;   // prevent redirect while password reset flow is active

    // Helper: display messages (error or success)
    function showMessage(msg, isError = true) {
        authMsg.innerText = msg;
        authMsg.classList.remove('hidden');
        authMsg.classList.remove('alert-success');
        if (!isError) authMsg.classList.add('alert-success');
        setTimeout(() => authMsg.classList.add('hidden'), 8000);
    }

    // Clear message when switching forms (optional)
    function clearMessage() {
        authMsg.classList.add('hidden');
        authMsg.innerText = '';
    }

    // Send welcome message after registration (existing logic)
    async function sendWelcomeMessage(userId) {
        try {
            const configRef = doc(db, "admin_config", "messages");
            const configSnap = await getDoc(configRef);
            let subject = "Welcome to OmaPosh";
            let body = "Thank you for joining OmaPosh Smart Savings! Start saving and joining thrift groups today.";
            if (configSnap.exists()) {
                const data = configSnap.data();
                if (data.welcomeSubject) subject = data.welcomeSubject;
                if (data.welcomeBody) body = data.welcomeBody;
            }
            await addDoc(collection(db, "messages"), {
                userId: userId,
                subject: subject,
                message: body,
                read: false,
                createdAt: new Date(),
                type: "welcome"
            });
            console.log("✅ Welcome message sent");
        } catch (err) {
            console.warn("⚠️ Welcome message not sent:", err);
        }
    }

    // ---------- UI SWITCH LOGIC (Login <-> Register <-> Reset) ----------
    document.getElementById('showRegisterBtn').onclick = () => {
        clearMessage();
        loginForm.classList.add('hidden');
        resetForm.classList.add('hidden');
        registerForm.classList.remove('hidden');
    };
    
    document.getElementById('showLoginBtn').onclick = () => {
        clearMessage();
        registerForm.classList.add('hidden');
        resetForm.classList.add('hidden');
        loginForm.classList.remove('hidden');
    };
    
    // Forgot password: show reset form, hide others
    document.getElementById('forgotPasswordBtn').onclick = () => {
        clearMessage();
        loginForm.classList.add('hidden');
        registerForm.classList.add('hidden');
        resetForm.classList.remove('hidden');
        // Pre-fill email from login field if available (UX improvement)
        const loginEmail = document.getElementById('loginEmail').value.trim();
        if (loginEmail) {
            document.getElementById('resetEmail').value = loginEmail;
        }
    };
    
    // Back to login from reset form
    document.getElementById('backToLoginFromResetBtn').onclick = () => {
        clearMessage();
        resetForm.classList.add('hidden');
        registerForm.classList.add('hidden');
        loginForm.classList.remove('hidden');
        isResetting = false;
    };
    
    // Also ensure any registration or login resets the reset flag
    // ---------- PASSWORD RESET FUNCTIONALITY (fully working) ----------
    const doResetBtn = document.getElementById('doResetBtn');
    const resetEmailInput = document.getElementById('resetEmail');
    
    doResetBtn.onclick = async () => {
        const email = resetEmailInput.value.trim();
        if (!email) {
            showMessage("Please enter your email address to reset password.");
            return;
        }
        
        // simple email format check
        if (!email.includes('@') || !email.includes('.')) {
            showMessage("Please enter a valid email address.");
            return;
        }
        
        // disable button to prevent double submission
        const originalBtnText = doResetBtn.innerText;
        doResetBtn.innerText = "Sending...";
        doResetBtn.disabled = true;
        isResetting = true;   // prevent onAuthStateChanged redirect
        
        try {
            // Firebase password reset email
            await sendPasswordResetEmail(auth, email);
            showMessage(`✅ Password reset link sent to ${email}. Check your inbox (and spam folder).`, false);
            
            // Clear the input field
            resetEmailInput.value = '';
            
            // After 3 seconds, optionally redirect back to login form
            setTimeout(() => {
                // Hide reset form, show login
                resetForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
                clearMessage();
                // Show an extra success tip on login screen
                showMessage(`Reset email sent! Follow the instructions in your email to set a new password.`, false);
                isResetting = false;
            }, 3000);
            
        } catch (error) {
            console.error("Password reset error:", error);
            let userFriendlyMsg = error.message;
            // Provide more helpful messages based on error codes
            if (error.code === 'auth/user-not-found') {
                userFriendlyMsg = "No account found with this email address. Please register first.";
            } else if (error.code === 'auth/invalid-email') {
                userFriendlyMsg = "Invalid email format. Please check and try again.";
            } else if (error.code === 'auth/too-many-requests') {
                userFriendlyMsg = "Too many reset requests. Please wait a few minutes before trying again.";
            } else if (error.code === 'auth/network-request-failed') {
                userFriendlyMsg = "Network error. Check your internet connection.";
            } else {
                userFriendlyMsg = `Error: ${error.message}`;
            }
            showMessage(userFriendlyMsg);
            isResetting = false;
        } finally {
            doResetBtn.innerText = originalBtnText;
            doResetBtn.disabled = false;
        }
    };
    
    // ---------- LOGIN LOGIC ----------
    document.getElementById('doLoginBtn').onclick = async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const pwd = document.getElementById('loginPassword').value;
        if (!email || !pwd) {
            showMessage("Please enter both email and password.");
            return;
        }
        try {
            await signInWithEmailAndPassword(auth, email, pwd);
            // No redirect here, onAuthStateChanged will redirect unless flags false
            // But we also set isRegistering/resetting false, so redirect works as expected
        } catch(e) {
            let errorMsg = e.message;
            if (e.code === 'auth/user-not-found') errorMsg = "No account found with this email.";
            else if (e.code === 'auth/wrong-password') errorMsg = "Incorrect password. Please try again.";
            else if (e.code === 'auth/too-many-requests') errorMsg = "Too many failed attempts. Try again later.";
            showMessage(errorMsg);
        }
    };
    
    // ---------- REGISTRATION LOGIC (with Firestore & welcome message) ----------
    document.getElementById('doRegisterBtn').onclick = async () => {
        const email = document.getElementById('regEmail').value.trim();
        const pwd = document.getElementById('regPassword').value;
        const fullName = document.getElementById('regFullName').value.trim();

        if (!email || !pwd || !fullName) {
            showMessage("All fields are required.");
            return;
        }
        if (pwd.length < 6) {
            showMessage("Password must be at least 6 characters.");
            return;
        }

        const registerBtn = document.getElementById('doRegisterBtn');
        const originalText = registerBtn.innerText;
        registerBtn.innerText = "Creating account...";
        registerBtn.disabled = true;
        isRegistering = true;    // block automatic redirect until done

        try {
            // Step 1: Create Auth user
            const userCred = await createUserWithEmailAndPassword(auth, email, pwd);
            const uid = userCred.user.uid;
            
            // Step 2: Write user document to Firestore (retry logic)
            const userData = {
                fullName: fullName,
                email: email,
                role: "user",
                createdAt: new Date().toISOString(),
                disabled: false,
                permissions: {}
            };
            
            let writeSuccess = false;
            let retries = 3;
            while (retries > 0 && !writeSuccess) {
                try {
                    await setDoc(doc(db, "users", uid), userData);
                    writeSuccess = true;
                } catch (firestoreErr) {
                    console.warn(`Firestore write retry left: ${retries-1}`, firestoreErr.message);
                    retries--;
                    if (retries === 0) throw firestoreErr;
                    await new Promise(r => setTimeout(r, 1000));
                }
            }

            // Step 3: Send welcome message
            await sendWelcomeMessage(uid);
            
            showMessage("Registration successful! Redirecting...", false);
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
            
        } catch (error) {
            console.error("Registration error:", error);
            let errorMsg = error.message;
            if (error.code === 'permission-denied') {
                errorMsg = "Permission denied. Please check Firestore security rules. They must allow writing to 'users/{userId}' for authenticated users.";
            } else if (error.code === 'auth/email-already-in-use') {
                errorMsg = "Email already registered. Please login instead.";
                // automatically switch to login form
                registerForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
                showMessage(errorMsg);
                isRegistering = false;
                registerBtn.disabled = false;
                registerBtn.innerText = originalText;
                return;
            }
            showMessage(errorMsg);
            registerBtn.disabled = false;
            registerBtn.innerText = originalText;
            isRegistering = false;
        }
    };
    
    // ---------- GLOBAL AUTH STATE HANDLER: redirect to index.html upon successful login ----------
    // Only redirect if we are NOT in the middle of registration or reset flow,
    // and the user is authenticated (user != null). This prevents disruptive redirects.
    onAuthStateChanged(auth, (user) => {
        if (user && !isRegistering && !isResetting) {
            // Avoid redirect loops if already on index.html? but fine.
            // Check current location to avoid forever redirect
            if (window.location.pathname.includes('login.html') || 
                window.location.pathname.endsWith('/') || 
                window.location.pathname === '' ||
                window.location.pathname.includes('auth.html')) {
                window.location.href = 'index.html';
            } else {
                // Just in case we are on this same page but different route
                window.location.href = 'index.html';
            }
        }
    });
    
    // Additional UX: pressing Enter in password reset field triggers reset
    resetEmailInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            doResetBtn.click();
        }
    });
    
    // Also allow Enter on login and register forms
    const loginPasswordInput = document.getElementById('loginPassword');
    loginPasswordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            document.getElementById('doLoginBtn').click();
        }
    });
    
    const regPasswordInput = document.getElementById('regPassword');
    regPasswordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            document.getElementById('doRegisterBtn').click();
        }
    });
    
    // Small enhancement: if user clicks "Forgot password?" from reset form already, but fine.
    // Ensure if reset succeeds, we avoid redirect issues
    // Additionally, clear reset flag when form is hidden manually via back button
    const resetObserver = new MutationObserver(() => {
        if (resetForm.classList.contains('hidden')) {
            isResetting = false;
        }
    });
    resetObserver.observe(resetForm, { attributes: true, attributeFilter: ['class'] });
    
    // If the user manually types in the login email and then uses reset, we pre-filled already.
    console.log("✅ OmaPosh auth system ready with password reset feature.");
</script>
</body>
</html>
